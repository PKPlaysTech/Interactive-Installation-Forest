<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Discovery Lab - Magic Forest</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        
        /* HTML 侧边按钮样式 - 绝对可见 */
        #ui-container {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 9999;
        }
        
        .menu-btn {
            padding: 15px 10px;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            border: 2px solid #00ffff;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            text-align: center;
            width: 100px;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.2);
            -webkit-tap-highlight-color: transparent;
        }

        /* 选中状态的样式 */
        .menu-btn.active {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 20px #00ffff;
        }

        .clear-btn {
            border-color: #ff4444;
            margin-top: 20px;
            color: #ff4444;
        }
        
        .clear-btn:active {
            background: #ff4444;
            color: white;
        }

        /* 隐藏原始视频，防止遮挡 */
        video { display: none !important; }
    </style>
</head>
<body>
    <div id="ui-container">
        <button id="btn-grass" class="menu-btn" onclick="setMode('grass')"> GRASS</button>
        <button id="btn-flower" class="menu-btn active" onclick="setMode('flower')"> FLOWER</button>
        <button id="btn-vine" class="menu-btn" onclick="setMode('vine')"> VINE</button>
        <button id="btn-butterfly" class="menu-btn" onclick="setMode('butterfly')"> BUTTERFLY</button>
        <button id="btn-star" class="menu-btn" onclick="setMode('star')"> STAR</button>
        <button id="btn-firefly" class="menu-btn" onclick="setMode('firefly')"> FIREFLY</button>
        <button class="menu-btn clear-btn" onclick="clearCanvas()"> CLEAR</button>
    </div>

    <script src="sketch.js"></script>
</body>
</html>
