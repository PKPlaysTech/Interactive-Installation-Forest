<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Magic Forest - Rose Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui-container {
            position: absolute; left: 30px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 12px; z-index: 9999;
        }
        .menu-btn {
            padding: 18px 12px; background: rgba(0, 0, 0, 0.8); color: white;
            border: 3px solid #00ffff; border-radius: 12px; font-weight: 900;
            cursor: pointer; font-size: 20px; width: 180px; transition: all 0.3s;
            text-transform: uppercase;
        }
        .menu-btn.active {
            background: #00ffff; color: #000; transform: scale(1.1) translateX(10px);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.8);
        }
        .clear-btn { border-color: #ff4444; color: #ff4444; margin-top: 20px; }
        video { display: none !important; }
    </style>
</head>
<body>
    <div id="ui-container">
        <button id="btn-grass" class="menu-btn" onclick="setMode('grass')"> GRASS</button>
        <button id="btn-flower" class="menu-btn active" onclick="setMode('flower')"> FLOWER</button>
        <button id="btn-rose" class="menu-btn" onclick="setMode('rose')"> ROSE</button>
        <button id="btn-vine" class="menu-btn" onclick="setMode('vine')"> VINE</button>
        <button id="btn-butterfly" class="menu-btn" onclick="setMode('butterfly')"> BUTTERFLY</button>
        <button id="btn-star" class="menu-btn" onclick="setMode('star')"> STAR</button>
        <button id="btn-firefly" class="menu-btn" onclick="setMode('firefly')"> FIREFLY</button>
        <button class="menu-btn clear-btn" onclick="clearCanvas()"> RESET</button>
    </div>
    <script src="sketch.js"></script>
</body>
</html>
